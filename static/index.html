<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Second Brain - Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
    <div class="bg-gradient"></div>

    <!-- Password Overlay -->
    <div id="auth-overlay">
        <div class="auth-card glass-panel">
            <h2>Welcome Back</h2>
            <p style="color: #666; margin-bottom: 2rem;">Vui lòng nhập mã truy cập để vào Second Brain.</p>
            <input type="password" id="password-input" placeholder="Nhập mã (687568)...">
            <button class="btn-primary" onclick="checkPassword()">Mở Khóa</button>
            <p id="auth-error" style="color: #ff4444; margin-top: 1rem; display: none;">Mã truy cập không chính xác!</p>
        </div>
    </div>

    <!-- Main Application -->
    <div class="app-container" id="main-content" style="display: none;">
        
        <!-- Sidebar -->
        <aside class="sidebar glass-panel">
            <div class="logo">
                <div class="logo-circle">2B</div>
                <span class="logo-text">SECOND<br>BRAIN</span>
            </div>
            
            <nav class="side-nav">
                <button class="nav-btn active" onclick="switchTab('knowledge', this)" title="Knowledge">
                    <i class="ph ph-brain"></i>
                </button>
                <button class="nav-btn" onclick="switchTab('business', this)" title="Business">
                    <i class="ph ph-briefcase"></i>
                </button>
                <button class="nav-btn" onclick="switchTab('brand_voice', this)" title="Brand Voice">
                    <i class="ph ph-megaphone"></i>
                </button>
            </nav>

            <div class="sidebar-bottom">
                <button class="nav-btn" title="Settings">
                    <i class="ph ph-gear"></i>
                </button>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-area">
            
            <!-- Header -->
            <header class="top-header">
                <div class="greeting">
                    <p class="date"><i class="ph ph-sun"></i> Good Morning, Dũng!</p>
                    <h1>What's Up With Your Brain, <span class="highlight">TODAY!</span></h1>
                </div>

                <div class="top-actions">
                    <div class="search-box glass-panel">
                        <i class="ph ph-magnifying-glass"></i>
                        <input type="text" placeholder="Search anything...">
                    </div>
                    <div class="profile-group">
                        <div class="notification">
                            <i class="ph ph-bell"></i>
                            <span class="badge">2</span>
                        </div>
                        <img src="https://i.pravatar.cc/150?img=11" alt="Profile" class="profile-pic">
                    </div>
                </div>
            </header>

            <!-- Dashboard Layout -->
            <div class="dashboard-layout">
                
                <!-- Central Graphic (3D Brain) -->
                <div class="central-graphic-container">
                    <div class="glass-orb orb-1"></div>
                    <div class="glass-orb orb-2"></div>
                    <img src="/static/3d-brain.png" alt="3D Brain" class="main-brain-img">
                    <div class="brain-pedestal glass-panel"></div>
                </div>

                <!-- Floating Data Items -->
                <div class="data-section">
                    <div class="section-header">
                        <h2 id="current-section-title">Knowledge Library</h2>
                        <button id="add-btn" class="btn-primary" onclick="openModal()">
                            <i class="ph ph-plus"></i> Thêm Mới
                        </button>
                    </div>
                    
                    <div id="items-grid" class="cards-grid">
                        <!-- Items injected here by JS -->
                    </div>
                </div>

            </div>
        </main>
    </div>

    <!-- Add/Edit Modal -->
    <div id="modal" class="modal">
        <div class="modal-content glass-panel">
            <h2 id="modal-title" style="margin-bottom: 1.5rem;">Thêm Nội Dung Mới</h2>
            <input type="hidden" id="edit-id">
            <input type="text" id="item-title" placeholder="Tiêu đề bài viết...">
            <textarea id="item-content" placeholder="Nội dung chi tiết..." rows="6"></textarea>
            <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
                <button class="btn-primary" onclick="saveItem()" style="flex: 2;">Lưu Lại</button>
                <button class="btn-secondary" onclick="closeModal()" style="flex: 1;">Hủy</button>
            </div>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
