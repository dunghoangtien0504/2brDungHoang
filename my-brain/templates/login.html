<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - Brain OS</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--primary-bg) 0%, var(--secondary-bg) 100%);
        }
        .login-card {
            background: var(--card-bg);
            padding: 3rem;
            border-radius: 30px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            text-align: center;
            width: 400px;
            max-width: 90%;
        }
        .login-card h2 {
            margin-bottom: 1.5rem;
            font-size: 2rem;
            color: var(--text-main);
        }
        .login-card input {
            width: 100%;
            padding: 1rem;
            margin-bottom: 1.5rem;
            border: 1px solid #ddd;
            border-radius: 50px;
            text-align: center;
            font-size: 1.2rem;
            letter-spacing: 5px;
        }
        .error-msg {
            color: #ff4d4d;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo" style="margin-bottom: 2rem;">
            <span class="logo-text">BRAIN<span class="accent">.OS</span></span>
        </div>
        <h2>Mã Truy Cập</h2>
        {% if request.query_params.get('error') %}
        <p class="error-msg">Mã truy cập không chính xác, vui lòng thử lại.</p>
        {% endif %}
        <form action="/login" method="post">
            <input type="password" name="code" placeholder="••••••" required autofocus>
            <button type="submit" class="primary-btn" style="width: 100%;">Mở Khóa Bộ Não</button>
        </form>
    </div>
</body>
</html>
